<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>page de recherche</title>
        <link rel="stylesheet" href="style.css">
        
    </head>
    
    <body>
        <div class="intro" style="text-align: center;">
            <h1>Welcome to our <span>weather forcast app</span></h1>
            <p>Please enter any city you like in our search bar below</p>
        </div>  

        <div class="search-bar">
            <input type="text" placeholder="Enter city name here (Ex: Paris,London,Béni Mellal....)">
            <button id="btn-search"><img src="image/vecteezy_reaction-icon-to-posts-on-social-media-and-video-streaming_14203540.png" alt="search"></button>
        </div>
        <div class="contenuCarte">
            <div class="carte-meteo">
            <div class="cityName">
                <img src="image/localisation.png" alt="">
                <h1 class="city">Beni Mellal</h1>
            </div>
            <div class="imgcenter">
                <img src="image/rain.png" alt="teeee">
            </div>
            <div class="etat">
                <div class="temp">
                    <img src="image/temp.png" alt="Temperature">
                    <h3>99°C</h3>
                </div>
                <div class="hummidity">
                    <img src="image/humidity.png" alt="Humidity">
                    <h3>67%</h3>
                </div>
                <div class="windSpeed">
                    <img src="image/vent.png" alt="wind speed">
                    <h3>69 km/h</h3>
                </div>
            </div>

        </div>

        <div class="historique">
            <ul class="les_historiques">
                <li>test <button id="up"><img src="image/up_arrow.png" alt="go up"></button>  <button id="down"><img src="image/down_arrow.png" alt="go down"></button>  <button id="delete"><img src="image/delete.png" alt="delete"></button></li>
            </ul>
        </div>
        </div>
        <script src="page2.js"></script>
        
    </body>
</html>
